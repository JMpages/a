<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #0e1217; /* Fondo oscuro de Canva */
        }

        /* Contenedor que centra el PDF y le da el look de diapositiva */
        .presentation-frame {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            /* Suaviza la carga */
            background-color: #0e1217;
        }
    </style>
</head>
<body>

    <div class="presentation-frame">
        <iframe 
            src="asig2.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit" 
            allow="fullscreen">
        </iframe>
    </div>

    <script>
        // Doble clic para Pantalla Completa (Ideal para proyectar en la facultad)
        document.addEventListener('dblclick', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
