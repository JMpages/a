<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presentación | Asig2</title>
    <style>
        /* Estética general estilo Dark Mode de Canva */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #0e1217; /* Color de fondo oscuro de Canva */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor principal para centrar la presentación */
        .presentation-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        /* Forzar visualización horizontal y sombras */
        iframe { 
            width: 95%; 
            height: 90%; 
            border: none;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
        }

        /* Tip para móviles: Forzar rotación visual si está en vertical */
        @media screen and (orientation: portrait) and (max-width: 768px) {
            .portrait-warning {
                display: flex;
                position: absolute;
                top: 0; left: 0; width: 100%; height: 100%;
                background: #0e1217;
                color: white;
                text-align: center;
                align-items: center;
                justify-content: center;
                z-index: 100;
                padding: 20px;
            }
        }

        @media screen and (orientation: landscape) {
            .portrait-warning { display: none; }
        }

        .portrait-warning { display: none; }
    </style>
</head>
<body>

    <div class="portrait-warning">
        <p>Por favor, gira tu dispositivo para ver la presentación en pantalla completa.</p>
    </div>

    <div class="presentation-container">
        <iframe src="asig2.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
    </div>

</body>
</html>
