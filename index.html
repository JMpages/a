<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación</title>
    <style>
        /* Reset total de márgenes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #0e1217; /* Fondo oscuro tipo Canva */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor de la presentación */
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Iframe maximizado */
        iframe { 
            flex-grow: 1;
            width: 100%; 
            height: 100%; 
            border: none;
            background-color: #ffffff;
        }

        /* Barra de herramientas simulada (opcional, para dar el "look") */
        .top-bar {
            height: 40px;
            background: #1a1f26;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #a7acb1;
            font-size: 14px;
            font-family: sans-serif;
            border-bottom: 1px solid #2d343d;
        }
    </style>
</head>
<body>

    <div class="canvas-wrapper">
        <div class="top-bar">Presentación: Asig2</div>
        
        <iframe 
            src="asig2.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" 
            allow="fullscreen">
        </iframe>
    </div>

    <script>
        // Truco opcional: Si haces doble clic, se pone en pantalla completa
        document.addEventListener('dblclick', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
