<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación - Asig2</title>
    <style>
        /* Elimina espacios y asegura que el visor ocupe toda la pantalla */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #333; /* Fondo oscuro por si tarda en cargar */
        }
        /* El iframe ocupa el 100% de la ventana del navegador */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <iframe src="asig2.pdf"></iframe>

</body>
</html>
